    background: transparent;
    border-bottom: 1px solid transparent;

    letter-spacing: 0.04em;
    text-transform: uppercase;

  }

    font-size: clamp(28px, 4vw, 38px);
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .section-head p {
    color: var(--text-secondary);
    font-size: 17px;
    max-width: 640px;
  }

  .terminal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px 32px;
    max-width: 620px;
    margin-bottom: 56px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.9;
    color: var(--text-secondary);
    min-height: 140px;

    display: inline-block;
    width: 8px;
    height: 15px;
    background: var(--accent);

    animation: blink 1s step-start infinite;
    margin-left: 2px;
  }

    opacity: 0;
    transition: opacity 0.3s ease;
  }

    letter-spacing: -0.02em;
    line-height: 1.15;

    margin-bottom: 28px;

    margin-bottom: 24px;
  }

    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 56px;
    letter-spacing: 0.02em;

    gap: 32px;
    margin-bottom: 48px;
  }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(40px, 6vw, 56px);
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 12px;
  }
  .stat-label {
    font-size: 14px;
    color: var(--text-secondary);
    max-width: 220px;
  }

  .cta-btn {
    display: inline-block;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 14px 24px;
    border-radius: 2px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .cta-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
  }
  .col h3 {
    color: var(--accent);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 18px;
  }
  .col p {
    color: var(--text-secondary);
    font-size: 15px;
  }

    gap: 28px;
    margin-bottom: 56px;
    padding-bottom: 48px;
    border-bottom: 1px solid var(--border);
  }

    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(22px, 2.6vw, 30px);
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 10px;
  }
  .impact-stat-label {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

    gap: 10px;
    margin-bottom: 40px;
  }

    border: 1px solid var(--border);

    font-size: 12.5px;

    font-size: 11px;

    color: var(--text-secondary);
    line-height: 1.6;

    font-size: 13px;
    color: var(--text-primary);

    .project-card, .principle-card { padding: 22px 20px; }
    .impact-strip { grid-template-columns: 1fr 1fr; }
  }

/* ================= STATE ================= */

let currentLang = 'en';
let activePillar = 'all';

/* ================= RENDER ================= */

function renderStaticI18n(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang][key] !== undefined) {
      el.textContent = translations[lang][key];
    }
  });
}

function renderImpactStats(lang) {
  const el = document.getElementById('impact-strip');
  el.innerHTML = IMPACT_STATS.map(s => `
    <div class="impact-stat">
      <div class="impact-stat-num mono">${s.value}</div>
      <div class="impact-stat-label">${lang === 'en' ? s.labelEn : s.labelDe}</div>
    </div>
  `).join('');
}

function renderFilterBar(lang) {
  const el = document.getElementById('filter-bar');
  const t = translations[lang];
  const buttons = [{ id: 'all', labelEn: t.filterAll, labelDe: t.filterAll }, ...PILLARS];
  el.innerHTML = buttons.map(p => `
    <button type="button" class="filter-btn mono ${activePillar === p.id ? 'active' : ''}" onclick="setPillarFilter('${p.id}')">${lang === 'en' ? p.labelEn : p.labelDe}</button>
  `).join('');
}

function setPillarFilter(id) {
  activePillar = id;
  renderFilterBar(currentLang);
  renderProjects(currentLang);
}

function splitResult(text) {
  const markers = ['Outcome:', 'Ergebnis:'];
  for (const m of markers) {
    const idx = text.indexOf(m);
    if (idx !== -1) {
      return { kpi: text.slice(0, idx).trim(), hook: text.slice(idx + m.length).trim() };
    }
  }
  return { kpi: text, hook: '' };
}

function renderProjects(lang) {
  const grid = document.getElementById('project-grid');
  const t = translations[lang];
  const list = activePillar === 'all' ? PROJECTS : PROJECTS.filter(p => p.pillar === activePillar);
  grid.innerHTML = list.map(p => {
    const resultText = lang === 'en' ? p.resultEn : p.resultDe;
    const { kpi, hook } = splitResult(resultText);
    const pillarInfo = PILLARS.find(pl => pl.id === p.pillar);
    const pillarLabel = pillarInfo ? (lang === 'en' ? pillarInfo.labelEn : pillarInfo.labelDe) : '';
    return `
    <div class="project-card" data-pillar="${p.pillar}">
      <div class="project-card-head" onclick="toggleProjectCard(this)">
        <div class="project-pillar-tag mono">${pillarLabel}</div>
        <h3>${lang === 'en' ? p.titleEn : p.titleDe}</h3>
        <p class="project-hook">${hook}</p>
        <div class="project-row stack-row">
          <span class="label mono">${t.labelStack}</span>
          <span class="value stack-value">${p.stack.join(' · ')}</span>

          <span class="value">${lang === 'en' ? p.problemEn : p.problemDe}</span>

          <span class="label mono">${t.labelCost}</span>

        <div class="project-row">
          <span class="label mono">${t.labelSolution}</span>
          <span class="value">${lang === 'en' ? p.solutionEn : p.solutionDe}</span>

function toggleProjectCard(headEl) {
  const card = headEl.closest('.project-card');

  const t = translations[currentLang];

/* ================= TERMINAL TYPING ================= */

const TERMINAL_LINES = [
  { text: "shuvadarshan.bhual --mode gtm-architect", cls: "line-1" },
  { text: "Loading: 9 years old. First line of code. Never stopped.", cls: "" },
  { text: "Status: Building revenue infrastructure that compounds.", cls: "" }
];

function typeTerminal() {
  const el = document.getElementById('terminal');
  let lineIdx = 0, charIdx = 0;
  const speed = 40;

  function typeChar() {
    if (lineIdx >= TERMINAL_LINES.length) {
      el.innerHTML += '<span class="cursor"></span>';
      revealHero();
      return;
    }
    const line = TERMINAL_LINES[lineIdx];
    if (charIdx === 0) {
      el.innerHTML += `<div class="${line.cls}"></div>`;
    }
    const lineEls = el.children;
    const target = lineEls[lineEls.length - 1];
    target.textContent = line.text.slice(0, charIdx + 1);
    charIdx++;
    if (charIdx >= line.text.length) {
      lineIdx++;
      charIdx = 0;
      setTimeout(typeChar, speed * 6);
    } else {
      setTimeout(typeChar, speed);
    }
  }
  typeChar();
}

function revealHero() {
  document.getElementById('hero-content').classList.add('visible');
}

/* ================= STAT COUNTERS ================= */

function animateCount(el) {
  const target = parseInt(el.getAttribute('data-count'), 10);
  const duration = 1400;
  const start = performance.now();

  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    el.textContent = Math.floor(progress * target);
    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      el.textContent = target;
    }
  }
  requestAnimationFrame(tick);
}

function setupStatObserver() {
  const stats = document.querySelectorAll('.stat-num');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !entry.target.dataset.counted) {
        entry.target.dataset.counted = "true";
        animateCount(entry.target);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.4 });
  stats.forEach(s => observer.observe(s));
}

/* ================= NAV SCROLL ================= */

function setupNavScroll() {
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 12);
  });
}

/* ================= INIT ================= */

document.addEventListener('DOMContentLoaded', () => {
  renderAll(currentLang);
  typeTerminal();
  setupStatObserver();
  setupNavScroll();
});
